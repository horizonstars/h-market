<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mahsulot - H Market</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body data-page="product">
  <nav class="navbar">
    <div class="nav-container">
      <a href="/" class="brand" aria-label="H Market bosh sahifa">
        <span class="h-logo h-logo-small"><span></span></span>
        <strong><span>H</span> Market</strong>
      </a>
      <div class="nav-links" id="nav-links">
        <a href="/">Bosh sahifa</a>
        <a href="/?category=Ilovalar">Ilovalar</a>
        <a href="/?category=Saytlar">Saytlar</a>
        <a href="/?category=Kitoblar">Kitoblar</a>
        <a href="/?category=Jurnallar">Jurnallar</a>
        <a href="/admin">Admin</a>
      </div>
      <button class="hamburger" id="hamburger" aria-label="Menyuni ochish">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <main class="product-detail-wrap">
    <a href="/" class="back-link">Bosh sahifaga qaytish</a>
    <div id="product-detail"></div>
  </main>

  <footer class="footer">
    <div><b><span>H</span> Market</b><p>Raqamli mahsulotlar markazi.</p></div>
    <a href="/admin">Admin panel</a>
  </footer>

  <div class="download-modal" id="download-modal" hidden>
    <div class="download-dialog">
      <button type="button" class="dialog-close" id="download-close" aria-label="Yopish"></button>
      <span class="shield-icon"></span>
      <h2>Xavfsiz yuklab olish</h2>
      <p id="download-text">Fayl HTTPS havola orqali ochiladi.</p>
      <a href="#" id="download-confirm" class="btn-primary" rel="noopener noreferrer">Yuklab olish</a>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
